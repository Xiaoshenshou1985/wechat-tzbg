<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>投资日报导航</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #0d1b3e 0%, #1a365d 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container {
  text-align: center;
  max-width: 400px;
  width: 100%;
}
h1 {
  color: #c9a84c;
  font-size: 24px;
  margin-bottom: 8px;
}
.subtitle {
  color: rgba(255,255,255,0.6);
  font-size: 13px;
  margin-bottom: 32px;
}
.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 16px;
  text-decoration: none;
  color: white;
  display: block;
  transition: transform 0.2s, background 0.2s;
  border: 1px solid rgba(255,255,255,0.15);
}
.card:hover {
  transform: translateY(-2px);
  background: rgba(255,255,255,0.18);
}
.card .icon { font-size: 32px; margin-bottom: 8px; }
.card .title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.card .desc { font-size: 12px; opacity: 0.7; }
.footer {
  color: rgba(255,255,255,0.4);
  font-size: 11px;
  margin-top: 24px;
}
</style>
</head>
<body>
<div class="container">
  <h1>📈 投资日报</h1>
  <p class="subtitle">每日A股+美股投资策略</p>
  
  <a href="a-stock.html" class="card">
    <div class="icon">🇨🇳</div>
    <div class="title">A股盘前日报</div>
    <div class="desc">每日08:30更新 · 宏观/资金/板块/策略</div>
  </a>
  
  <a href="us-stock.html" class="card">
    <div class="icon">🇺🇸</div>
    <div class="title">美股盘前日报</div>
    <div class="desc">每日18:00更新 · 七巨头/技术面/宏观前瞻</div>
  </a>
  
  <p class="footer">本报告仅供参考，不构成投资建议</p>
</div>
</body>
</html>

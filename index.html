<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投资日报 · 宏邦集团</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --sidebar-width: 260px;
    --sidebar-collapsed: 0;
    --navy: #0f1923;
    --navy-light: #1a2a3a;
    --navy-hover: #243447;
    --gold: #c9a227;
    --gold-light: #e8c657;
    --text-muted: #8a9ba8;
    --text-light: #cdd9e6;
    --danger: #d14c4c;
    --success: #3cba6f;
    --bg-page: #f4f2ed;
  }

  html, body { height: 100%; overflow: hidden; font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif; }

  /* ── Layout ── */
  .app { display: flex; height: 100vh; }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-width);
    min-width: var(--sidebar-width);
    background: var(--navy);
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 10;
    transition: width 0.3s, min-width 0.3s;
  }

  .sidebar-brand {
    padding: 32px 24px 28px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .sidebar-brand .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .sidebar-brand .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 16px;
    color: var(--navy);
    flex-shrink: 0;
  }

  .sidebar-brand .brand-text h1 {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.3px;
    line-height: 1.3;
  }

  .sidebar-brand .brand-text p {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  /* ── Nav ── */
  .sidebar-nav {
    flex: 1;
    padding: 20px 12px;
    overflow-y: auto;
  }

  .nav-section {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    padding: 0 12px;
    margin-bottom: 12px;
    margin-top: 4px;
    font-weight: 500;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-radius: 8px;
    cursor: pointer;
    color: var(--text-light);
    font-size: 14px;
    font-weight: 400;
    transition: all 0.2s;
    margin-bottom: 3px;
    position: relative;
    user-select: none;
  }

  .nav-item:hover {
    background: var(--navy-hover);
    color: #fff;
  }

  .nav-item.active {
    background: rgba(201, 162, 39, 0.12);
    color: var(--gold-light);
    font-weight: 500;
  }

  .nav-item.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 24px;
    background: var(--gold);
    border-radius: 0 3px 3px 0;
  }

  .nav-item .icon {
    width: 32px; height: 32px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    background: rgba(255,255,255,0.05);
  }

  .nav-item.active .icon {
    background: rgba(201, 162, 39, 0.2);
  }

  .nav-item .label {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .nav-item .badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(255,255,255,0.08);
    color: var(--text-muted);
    font-weight: 500;
  }

  .nav-item.active .badge {
    background: rgba(201, 162, 39, 0.2);
    color: var(--gold-light);
  }

  /* ── Sidebar Footer ── */
  .sidebar-footer {
    padding: 16px 24px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sidebar-footer .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), #8b6f1a);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--navy);
    flex-shrink: 0;
  }

  .sidebar-footer .info { flex: 1; }
  .sidebar-footer .info .name { font-size: 12px; color: #fff; font-weight: 500; }
  .sidebar-footer .info .role { font-size: 10px; color: var(--text-muted); }

  /* ── Main content ── */
  .main {
    flex: 1;
    background: var(--bg-page);
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  /* ── Top bar ── */
  .topbar {
    height: 56px;
    background: #fff;
    border-bottom: 1px solid #e8e5de;
    display: flex;
    align-items: center;
    padding: 0 28px;
    gap: 16px;
    flex-shrink: 0;
  }

  .topbar .current-title {
    font-size: 16px;
    font-weight: 500;
    color: var(--navy);
    flex: 1;
  }

  .topbar .current-title span { color: var(--text-muted); font-weight: 400; }

  .topbar .update-info {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .topbar .update-info .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--success);
    display: inline-block;
  }

  /* ── iframe ── */
  .content-frame {
    flex: 1;
    border: none;
    width: 100%;
    height: 100%;
    background: #fff;
  }

  /* ── Loading ── */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg-page);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.4s, visibility 0.4s;
  }

  .loading-overlay.hidden {
    opacity: 0;
    visibility: hidden;
  }

  .loading-spinner {
    width: 40px; height: 40px;
    border: 3px solid #e0ddd5;
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-overlay p {
    margin-top: 20px;
    color: var(--text-muted);
    font-size: 14px;
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .sidebar { width: 60px; min-width: 60px; }
    .sidebar-brand { padding: 20px 12px; }
    .sidebar-brand .brand-text { display: none; }
    .sidebar-brand .logo { justify-content: center; }
    .nav-item { padding: 12px; justify-content: center; }
    .nav-item .label,
    .nav-item .badge,
    .nav-section,
    .sidebar-footer .info { display: none; }
    .sidebar-footer { justify-content: center; padding: 16px; }
    .topbar { padding: 0 16px; }
    .topbar .update-info .text { display: none; }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <p>加载日报中…</p>
</div>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo">
        <div class="logo-icon">投</div>
        <div class="brand-text">
          <h1>投资日报</h1>
          <p>HONGBANG · RESEARCH</p>
        </div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">日报</div>

      <div class="nav-item active" data-page="a-stock" onclick="switchPage('a-stock')">
        <div class="icon">🇨🇳</div>
        <span class="label">A股盘前日报</span>
        <span class="badge">A股</span>
      </div>

      <div class="nav-item" data-page="us-stock" onclick="switchPage('us-stock')">
        <div class="icon">🇺🇸</div>
        <span class="label">美股盘前日报</span>
        <span class="badge">美股</span>
      </div>

      <div class="nav-section" style="margin-top: 20px;">总结</div>

      <div class="nav-item" data-page="e-stock-summary" onclick="switchPage('e-stock-summary')">
        <div class="icon">📊</div>
        <span class="label">A股盘后总结</span>
        <span class="badge">复盘</span>
      </div>

      <div class="nav-item" data-page="w-stock-summary" onclick="switchPage('w-stock-summary')">
        <div class="icon">📈</div>
        <span class="label">每周全市场总结</span>
        <span class="badge">周报</span>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="avatar">H</div>
      <div class="info">
        <div class="name">宏邦研究</div>
        <div class="role">投研中心</div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div class="current-title" id="pageTitle">🇨🇳 <span>A股盘前日报</span></div>
      <div class="update-info">
        <span class="dot"></span>
        <span class="text">自动更新 · 交易时段</span>
      </div>
    </div>
    <iframe class="content-frame" id="contentFrame" src="a-stock.html"></iframe>
  </div>
</div>

<script>
  const pages = {
    'a-stock':         { title: '🇨🇳  A股盘前日报', name: 'A股盘前日报' },
    'us-stock':        { title: '🇺🇸  美股盘前日报', name: '美股盘前日报' },
    'e-stock-summary': { title: '📊  A股盘后总结',   name: 'A股盘后总结' },
    'w-stock-summary': { title: '📈  每周全市场总结', name: '每周全市场总结' }
  };

  function switchPage(page) {
    // Update active nav
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.querySelector(`.nav-item[data-page="${page}"]`).classList.add('active');

    // Update title
    const info = pages[page];
    document.getElementById('pageTitle').innerHTML = info.title;

    // Load iframe
    const frame = document.getElementById('contentFrame');
    frame.src = page + '.html';
  }

  // Hide loading when iframe loads
  document.getElementById('contentFrame').addEventListener('load', function() {
    document.getElementById('loading').classList.add('hidden');
  });

  // Auto-hide loading after 3s fallback
  setTimeout(() => {
    document.getElementById('loading').classList.add('hidden');
  }, 3000);
</script>
</body>
</html>
